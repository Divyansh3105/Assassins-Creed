<!DOCTYPE html>
<html lang="en">

<head>
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">
    <meta charset="UTF-8" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Google Fonts: Orbitron (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Era - Assassin's Creed Tribute</title>

    <!-- Open Graph (og:title, og:description, og:image, og:url updated dynamically by loadEraContent()) -->
    <meta property="og:title" content="Era - Assassin's Creed Tribute">
    <meta property="og:description" content="Explore the Assassin's Creed eras and chronicles.">
    <meta property="og:image" content="https://divyansh3105.github.io/Assassins-Creed/Media/OG.png">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/styles_era.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Web Components -->
    <script src="js/components.js"></script>
</head>

<body>
    <noscript>
        <style>
            #loading-screen {
                display: none !important;
            }
        </style>
        <div
            style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050505;color:#fff;font-family:sans-serif;text-align:center;padding:2rem;">
            <p style="font-size:2rem;letter-spacing:4px;text-transform:uppercase;color:#00d2ff;margin-bottom:1rem;">
                &#9888; Animus Offline</p>
            <p style="color:#64748b;max-width:480px;line-height:1.7;">JavaScript is required to synchronize with the
                Animus Archives.<br>Please enable it in your browser settings to continue.</p>
            <a href="index.html"
                style="margin-top:2rem;padding:0.75rem 2rem;border:1px solid #00d2ff;color:#00d2ff;text-decoration:none;letter-spacing:2px;font-size:0.85rem;text-transform:uppercase;">Return
                to Base</a>
        </div>
    </noscript>
    <!-- Loading Screen -->
    <loading-screen></loading-screen>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <site-header></site-header>

    <main id="era-content" style="display: none;">
        <section id="hero-dynamic">
            <div class="hero-overlay-desktop"></div>
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 class="glint-text" id="era-title"></h1>
                    <p class="hero-subtitle-animus" id="era-subtitle"></p>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about">
            <h2 id="era-about-heading">Exploring the Era</h2>
            <div class="about-content" id="era-about-content">
                <!-- Injected via JS -->
            </div>
        </section>

        <section class="game-container">
            <h2>The Chronicles</h2>
            <div class="assassin-grid" id="era-games-grid">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <div id="error-message" class="animus-error-panel" style="display: none;">
        <h2><i class="bi bi-exclamation-triangle-fill"></i> System Desynchronized</h2>
        <p>Memory block not found. Please return to the Animus hub.</p>
        <a href="index.html" class="btn-cta-animus" style="margin-top:20px;">Return to Hub</a>
    </div>

    <!-- Footer -->
    <site-footer></site-footer>

    <!-- Background Music -->
    <audio id="bg-music" src="Media/background.mp3" loop></audio>

    <!-- Scripts -->
    <script src="js/script.js"></script>
    <!-- DOMPurify: sanitize all HTML injected from data.json to prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadEraContent();
        });
    </script>

</body>

</html>
