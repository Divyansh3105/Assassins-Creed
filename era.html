<!DOCTYPE html>
<html lang="en">

<head>
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Era - Assassin's Creed Tribute</title>

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/styles_era.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Web Components -->
    <script src="js/components.js"></script>
</head>

<body>
    <!-- Loading Screen -->
    <loading-screen></loading-screen>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <site-header></site-header>

    <main id="era-content" style="display: none;">
        <section id="hero-dynamic">
            <div class="hero-overlay-desktop"></div>
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 class="glint-text" id="era-title"></h1>
                    <p class="hero-subtitle-animus" id="era-subtitle"></p>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about">
            <h2 id="era-about-heading">Exploring the Era</h2>
            <div class="about-content" id="era-about-content">
                <!-- Injected via JS -->
            </div>
        </section>

        <section class="game-container">
            <h2>The Chronicles</h2>
            <div class="assassin-grid" id="era-games-grid">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <div id="error-message" class="animus-error-panel" style="display: none;">
        <h2><i class="bi bi-exclamation-triangle-fill"></i> System Desynchronized</h2>
        <p>Memory block not found. Please return to the Animus hub.</p>
        <a href="index.html" class="btn-cta-animus" style="margin-top:20px;">Return to Hub</a>
    </div>

    <!-- Footer -->
    <site-footer></site-footer>

    <!-- Background Music -->
    <audio id="bg-music" src="Media/background.mp3" autoplay loop></audio>

    <!-- Scripts -->
    <script src="js/script.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadEraContent();
        });
    </script>

</body>

</html>
