<!DOCTYPE html>
<html lang="en">

<head>
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">
    <meta charset="UTF-8">

    <!-- Google Fonts: Orbitron (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Quiz — Animus Archives | Assassin's Creed Tribute</title>

    <meta name="description"
        content="Synchronize your traits with the Animus to discover which Assassin Brotherhood archetype you align with.">

    <!-- Open Graph -->
    <meta property="og:title" content="Personality Quiz — Animus Archives | Assassin's Creed Tribute">
    <meta property="og:description"
        content="Synchronize your traits with the Animus to discover which Assassin Brotherhood archetype you align with.">
    <meta property="og:image" content="https://divyansh3105.github.io/Assassins-Creed/Media/OG.png">
    <meta property="og:url" content="https://divyansh3105.github.io/Assassins-Creed/quiz_hub.html">
    <meta property="og:type" content="website">
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Site Shared Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Quiz Specific Styles -->
    <link rel="stylesheet" href="css/quiz.css">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="js/components.js"></script>
</head>

<body>
    <noscript>
        <style>
            #loading-screen {
                display: none !important;
            }
        </style>
        <div
            style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050505;color:#fff;font-family:sans-serif;text-align:center;padding:2rem;">
            <p style="font-size:2rem;letter-spacing:4px;text-transform:uppercase;color:#00d2ff;margin-bottom:1rem;">
                &#9888; Animus Offline</p>
            <p style="color:#64748b;max-width:480px;line-height:1.7;">JavaScript is required to run the Animus
                quiz.<br>Please enable it in your browser settings to continue.</p>
            <a href="index.html"
                style="margin-top:2rem;padding:0.75rem 2rem;border:1px solid #00d2ff;color:#00d2ff;text-decoration:none;letter-spacing:2px;font-size:0.85rem;text-transform:uppercase;">Return
                to Base</a>
        </div>
    </noscript>
    <div id="particles-js"></div>
    <loading-screen></loading-screen>
    <site-header></site-header>

    <main>
        <div class="quiz-bg-decor"></div>
        <div class="quiz-code-bg left">0101</div>
        <div class="quiz-code-bg right">1010</div>

        <section class="quiz-wrapper">
            <div class="quiz-card" id="quiz-container">

                <!-- Progress Header -->
                <div class="quiz-header">
                    <div class="quiz-meta">
                        <span class="quiz-meta-title"><i class="bi bi-cpu-fill"></i> Synchronization</span>
                        <span class="quiz-meta-step" id="quiz-step">Sequence 1 of 5</span>
                    </div>
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" id="quiz-progress" style="width: 20%;"></div>
                    </div>
                    <p class="quiz-subtitle">Analyzing personality matrix...</p>
                </div>

                <!-- Active Question Container -->
                <div class="quiz-body" id="quiz-body">
                    <h2 class="quiz-question" id="quiz-question-title">Loading sequence...</h2>

                    <div class="quiz-options" id="quiz-options">
                        <!-- Options generated by JS -->
                    </div>

                    <!-- Navigation -->
                    <div class="quiz-actions">
                        <button class="btn-quiz-secondary" id="quiz-prev-btn" style="visibility: hidden;">
                            <i class="bi bi-chevron-left"></i> Previous
                        </button>
                        <button class="btn-quiz-primary" id="quiz-next-btn" disabled>
                            Next Sequence <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>

            </div>
        </section>

        <p class="quiz-footer-hint">Synchronizing genetic memory... Do not disconnect.</p>
    </main>

    <site-footer></site-footer>

    <button id="scroll-top" aria-label="Scroll to top">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="js/script.js"></script>
    <script src="js/quiz.js"></script>

    <script>
        if (typeof particlesJS !== 'undefined') {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 35 },
                    color: { value: '#f4c025' },
                    shape: { type: 'circle' },
                    opacity: { value: 0.15, random: true },
                    size: { value: 1.5, random: true },
                    line_linked: { enable: true, distance: 130, color: '#f4c025', opacity: 0.08, width: 1 },
                    move: { enable: true, speed: 0.5, random: true }
                },
                interactivity: { events: { onhover: { enable: true, mode: 'grab' } } },
                retina_detect: true
            });
        }
    </script>
</body>

</html>
