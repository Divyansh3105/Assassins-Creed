<!DOCTYPE html>
<html lang="en">

<head>
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">
    <meta charset="UTF-8">

    <!-- Google Fonts: Orbitron (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legendary Assassins - Assassin's Creed Tribute</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Legendary Assassins | Assassin's Creed Tribute">
    <meta property="og:description"
        content="Masters of stealth and guardians of freedom — meet the legendary assassins of the Brotherhood.">
    <meta property="og:image" content="https://divyansh3105.github.io/Assassins-Creed/Media/OG.png">
    <meta property="og:url" content="https://divyansh3105.github.io/Assassins-Creed/Assassins.html">
    <meta property="og:type" content="website">

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Web Components -->
    <script src="js/components.js"></script>
</head>

<body>
    <noscript>
        <style>
            #loading-screen {
                display: none !important;
            }
        </style>
        <div
            style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050505;color:#fff;font-family:sans-serif;text-align:center;padding:2rem;">
            <p style="font-size:2rem;letter-spacing:4px;text-transform:uppercase;color:#00d2ff;margin-bottom:1rem;">
                &#9888; Animus Offline</p>
            <p style="color:#64748b;max-width:480px;line-height:1.7;">JavaScript is required to synchronize with the
                Animus Archives.<br>Please enable it in your browser settings to continue.</p>
            <a href="index.html"
                style="margin-top:2rem;padding:0.75rem 2rem;border:1px solid #00d2ff;color:#00d2ff;text-decoration:none;letter-spacing:2px;font-size:0.85rem;text-transform:uppercase;">Return
                to Base</a>
        </div>
    </noscript>
    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Loading Screen -->
    <loading-screen></loading-screen>

    <!-- Header -->
    <site-header></site-header>

    <main>
        <!-- Hero Section -->
        <section id="hero-assassins">
            <div class="hero-overlay-desktop"></div>
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 class="glint-text">Legends of the Creed</h1>
                    <p class="hero-subtitle-animus">Masters of stealth, guardians of freedom</p>
                </div>
            </div>
        </section>

        <!-- Master Assassins Section -->
        <section id="master-assassins">
            <h2>Master Assassins</h2>

            <!-- Filter Section -->
            <div class="filter-container">
                <div class="filter-pills">
                    <button class="filter-btn active" data-filter="all">
                        <i class="bi bi-grid-fill"></i> All Assassins
                    </button>
                    <button class="filter-btn" data-filter="mentor">
                        <i class="bi bi-trophy-fill"></i> Mentors
                    </button>
                    <button class="filter-btn" data-filter="founder">
                        <i class="bi bi-shield-fill"></i> Founders
                    </button>
                    <button class="filter-btn" data-filter="ancient">
                        <i class="bi bi-hourglass-split"></i> Ancient Era
                    </button>
                    <button class="filter-btn" data-filter="modern">
                        <i class="bi bi-clock-history"></i> Modern Era
                    </button>
                </div>
            </div>

            <div class="assassin-grid" id="main-assassins-grid"></div>
        </section>
    </main>

    <!-- Footer Section -->
    <site-footer></site-footer>

    <!-- Background Music -->
    <audio id="bg-music" src="Media/background.mp3" loop></audio>

    <!-- Custom JavaScript -->
    <script src="js/script.js"></script>
    <!-- DOMPurify: sanitize all HTML injected from data.json to prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAssassinsContent();
        });
    </script>
</body>

</html>
