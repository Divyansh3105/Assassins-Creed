<!DOCTYPE html>
<html lang="en">

<head>
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legendary Assassins - Assassin's Creed Tribute</title>

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Web Components -->
    <script src="js/components.js"></script>
</head>

<body>
    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Loading Screen -->
    <loading-screen></loading-screen>

    <!-- Header -->
    <site-header></site-header>

    <main>
        <!-- Hero Section -->
        <section id="hero-assassins">
            <div class="hero-overlay-desktop"></div>
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 class="glint-text">Legends of the Creed</h1>
                    <p class="hero-subtitle-animus">Masters of stealth, guardians of freedom</p>
                </div>
            </div>
        </section>

        <!-- Master Assassins Section -->
        <section id="master-assassins">
            <h2>Master Assassins</h2>

            <!-- Filter Section -->
            <div class="filter-container">
                <div class="filter-pills">
                    <button class="filter-btn active" data-filter="all">
                        <i class="bi bi-grid-fill"></i> All Assassins
                    </button>
                    <button class="filter-btn" data-filter="mentor">
                        <i class="bi bi-trophy-fill"></i> Mentors
                    </button>
                    <button class="filter-btn" data-filter="founder">
                        <i class="bi bi-shield-fill"></i> Founders
                    </button>
                    <button class="filter-btn" data-filter="ancient">
                        <i class="bi bi-hourglass-split"></i> Ancient Era
                    </button>
                    <button class="filter-btn" data-filter="modern">
                        <i class="bi bi-clock-history"></i> Modern Era
                    </button>
                </div>
            </div>

            <div class="assassin-grid" id="main-assassins-grid"></div>
        </section>
    </main>

    <!-- Footer Section -->
    <site-footer></site-footer>

    <!-- Background Music -->
    <audio id="bg-music" src="Media/background.mp3" autoplay loop></audio>

    <!-- Custom JavaScript -->
    <script src="js/script.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAssassinsContent();
        });
    </script>
</body>

</html>
