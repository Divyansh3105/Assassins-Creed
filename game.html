<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Game Title</title>

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/styles_game.css">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Link to Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Web Components -->
    <script src="js/components.js"></script>
</head>

<body>
    <!-- Loading Screen -->
    <loading-screen></loading-screen>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Header and Navigation -->
    <site-header></site-header>

    <!-- Game Content -->
    <main id="game-content" style="display: none;">
        <!-- Hero Banner -->
        <section class="hero-game-detail" id="game-hero">
            <div class="hero-overlay">
                <h1 id="game-title">Game Title</h1>
            </div>
        </section>

        <section class="game-container">
            <!-- Game Info Cards -->
            <section class="game-info-cards" id="game-info-cards">
                <!-- Injected via JS -->
            </section>

            <!-- Campaign Info -->
            <section class="two-column-layout">
                <div class="video-responsive">
                    <iframe id="game-video" src="" frameborder="0"
                        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>
                <div>
                    <h3 class="section-subtitle" id="game-story-subtitle">Subtitle</h3>
                    <div id="game-story-desc"></div>
                    <div class="story-highlights">
                        <h4>Story Highlights</h4>
                        <ul id="game-story-highlights">
                            <!-- Injected via JS -->
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Features Section -->
            <section class="features-section" id="game-features-section" style="display: none;">
                <h3 class="section-title">Core Features</h3>
                <div class="three-column-grid" id="game-features">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Characters -->
            <section id="game-characters-section" style="display: none;">
                <h3 class="section-title">Notable Characters</h3>
                <div class="three-column-grid" id="game-characters">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Gameplay Mechanics -->
            <section class="gameplay-section" id="game-mechanics-section" style="display: none;">
                <h3 class="section-title">Gameplay Mechanics</h3>
                <div class="two-column-layout" id="game-mechanics">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Gallery -->
            <section id="game-gallery-section" style="display: none;">
                <h3 class="section-title">Game Gallery</h3>
                <div class="three-column-grid" id="game-gallery">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Legacy Section -->
            <section class="legacy-section" id="game-legacy-section" style="display: none;">
                <h3 class="section-title">Legacy & Impact</h3>
                <div class="legacy-content" id="game-legacy-html">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Call to Action -->
            <section class="cta-section">
                <h3 id="game-cta-title">Discover the Experience</h3>
                <p id="game-cta-subtitle"></p>
                <a href="#" target="_blank" class="btn" id="game-play-now">
                    Play Now
                </a>
            </section>
        </section>
    </main>

    <div id="error-message" style="display: none; text-align: center; padding: 100px; color: white;">
        <h2>Game Not Found</h2>
        <p>The requested game could not be found. Please check the URL or select a game from an era page.</p>
        <a href="index.html" style="color: #dc3545; display: inline-block; margin-top: 20px;">Return to Home</a>
    </div>

    <!-- Footer -->
    <site-footer></site-footer>

    <!-- Background Music -->
    <audio id="bg-music" src="Media/background.mp3" autoplay loop></audio>

    <script src="js/script.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadGameContent();
        });
    </script>

</body>

</html>
