<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Google Fonts: Orbitron (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Game Title</title>

    <!-- Open Graph (og:title, og:description, og:image, og:url updated dynamically by loadGameContent()) -->
    <meta property="og:title" content="Assassin's Creed">
    <meta property="og:description" content="Discover the Assassin's Creed universe.">
    <meta property="og:image" content="https://divyansh3105.github.io/Assassins-Creed/Media/OG.png">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/styles_game.css">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Link to Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <!-- Web Components -->
    <script src="js/components.js"></script>
</head>

<body>
    <noscript>
        <style>
            #loading-screen {
                display: none !important;
            }
        </style>
        <div
            style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050505;color:#fff;font-family:sans-serif;text-align:center;padding:2rem;">
            <p style="font-size:2rem;letter-spacing:4px;text-transform:uppercase;color:#00d2ff;margin-bottom:1rem;">
                &#9888; Animus Offline</p>
            <p style="color:#64748b;max-width:480px;line-height:1.7;">JavaScript is required to synchronize with the
                Animus Archives.<br>Please enable it in your browser settings to continue.</p>
            <a href="index.html"
                style="margin-top:2rem;padding:0.75rem 2rem;border:1px solid #00d2ff;color:#00d2ff;text-decoration:none;letter-spacing:2px;font-size:0.85rem;text-transform:uppercase;">Return
                to Base</a>
        </div>
    </noscript>
    <!-- Loading Screen -->
    <loading-screen></loading-screen>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Header and Navigation -->
    <site-header></site-header>

    <!-- Game Content -->
    <main id="game-content" style="display: none;">
        <!-- Hero Banner -->
        <section class="hero-game-detail" id="game-hero">
            <div class="hero-overlay-desktop"></div>
            <div class="hero-overlay">
                <div class="hero-content">
                    <h1 class="glint-text" id="game-title">Game Title</h1>
                </div>
            </div>
        </section>

        <section class="game-container">
            <!-- Game Info Cards -->
            <section class="game-info-cards" id="game-info-cards">
                <!-- Injected via JS -->
            </section>

            <!-- Campaign Info -->
            <section class="two-column-layout">
                <div class="video-responsive">
                    <iframe id="game-video" src="" frameborder="0"
                        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>
                <div>
                    <h3 class="section-subtitle" id="game-story-subtitle">Subtitle</h3>
                    <div id="game-story-desc"></div>
                    <div class="story-highlights">
                        <h4>Story Highlights</h4>
                        <ul id="game-story-highlights">
                            <!-- Injected via JS -->
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Features Section -->
            <section class="features-section" id="game-features-section" style="display: none;">
                <h3 class="section-title">Core Features</h3>
                <div class="three-column-grid" id="game-features">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Characters -->
            <section id="game-characters-section" style="display: none;">
                <h3 class="section-title">Notable Characters</h3>
                <div class="three-column-grid" id="game-characters">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Gameplay Mechanics -->
            <section class="gameplay-section" id="game-mechanics-section" style="display: none;">
                <h3 class="section-title">Gameplay Mechanics</h3>
                <div class="two-column-layout" id="game-mechanics">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Gallery -->
            <section id="game-gallery-section" style="display: none;">
                <h3 class="section-title">Game Gallery</h3>
                <div class="three-column-grid" id="game-gallery">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Legacy Section -->
            <section class="legacy-section" id="game-legacy-section" style="display: none;">
                <h3 class="section-title">Legacy & Impact</h3>
                <div class="legacy-content" id="game-legacy-html">
                    <!-- Injected via JS -->
                </div>
            </section>

            <!-- Call to Action -->
            <section class="cta-section">
                <h3 id="game-cta-title">Discover the Experience</h3>
                <p id="game-cta-subtitle"></p>
                <a href="#" target="_blank" class="btn-cta-animus" style="display:inline-flex;" id="game-play-now">
                    Play Now
                </a>
            </section>
        </section>
    </main>

    <div id="error-message" class="animus-error-panel" style="display: none;">
        <h2><i class="bi bi-exclamation-triangle-fill"></i> System Desynchronized</h2>
        <p>Memory block not found. Please return to the Animus hub.</p>
        <a href="index.html" class="btn-cta-animus" style="margin-top:20px;">Return to Hub</a>
    </div>

    <!-- Footer -->
    <site-footer></site-footer>

    <!-- Background Music -->
    <audio id="bg-music" src="Media/background.mp3" loop></audio>

    <script src="js/script.js"></script>
    <!-- DOMPurify: sanitize all HTML injected from data.json to prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadGameContent();
        });
    </script>

</body>

</html>
