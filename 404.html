<!DOCTYPE html>
<html lang="en">

<head>
    <link href="Media/AC_OG.webp" rel="icon" type="image/x-icon">
    <meta charset="UTF-8">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Google Fonts: Orbitron (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Corrupted — Assassin's Creed Tribute</title>

    <meta name="description" content="The Animus could not synchronize this memory. The requested page does not exist.">
    <meta name="robots" content="noindex">

    <!-- Open Graph -->
    <meta property="og:title" content="Memory Corrupted — Assassin's Creed Tribute">
    <meta property="og:description" content="The Animus could not synchronize this memory.">
    <meta property="og:image" content="https://divyansh3105.github.io/Assassins-Creed/Media/OG.png">
    <meta property="og:url" content="https://divyansh3105.github.io/Assassins-Creed/404.html">
    <meta property="og:type" content="website">

    <!-- Preload Custom Font -->
    <link rel="preload" href="Media/Assassin.ttf" as="font" type="font/ttf" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Base styles only — no page-specific sheets needed -->
    <link rel="stylesheet" href="css/base.css">

    <style>
        /* ---- Reset & Layout ---- */
        *,
        *::before,
        *::after {
            < !-- PWA Service Worker Registration --><script>if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                        navigator.serviceWorker.register('js/service-worker.js') .then(function(registration) {
                                console.log('ServiceWorker registration successful:', registration.scope);

                            }) .catch(function(error) {
                                console.log('ServiceWorker registration failed:', error);
                            });
                    });
            }

            </script>box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050508;
            color: var(--text-white, #fff);
            font-family: "Inter", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ---- Animated grid background ---- */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(200, 170, 80, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 170, 80, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridShift 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridShift {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 48px 48px;
            }
        }

        /* ---- Glitch radial glow ---- */
        body::after {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(200, 165, 60, 0.06) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* ---- Card ---- */
        .error-card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 90%;
            background: rgba(10, 10, 12, 0.85);
            border: 1px solid rgba(200, 165, 60, 0.15);
            border-top: 2px solid rgba(200, 165, 60, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 4px;
            animation: fadeIn 0.6s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- Animus logo icon ---- */
        .animus-icon {
            font-size: 3.5rem;
            color: rgba(200, 165, 60, 0.5);
            margin-bottom: 1.5rem;
            display: block;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        /* ---- Error code ---- */
        .error-code {
            font-family: var(--font-display, "Assassin", serif);
            font-size: clamp(5rem, 20vw, 8rem);
            font-weight: 900;
            letter-spacing: 6px;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 1px rgba(200, 165, 60, 0.4);
            text-shadow: 0 0 40px rgba(200, 165, 60, 0.15);
            margin-bottom: 0.5rem;
            position: relative;
        }

        /* Glitch effect on the 404 number */
        .error-code::before,
        .error-code::after {
            content: "404";
            position: absolute;
            inset: 0;
            -webkit-text-stroke: 1px;
        }

        .error-code::before {
            color: rgba(0, 210, 255, 0.15);
            animation: glitch1 4s infinite;
            clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
        }

        .error-code::after {
            color: rgba(255, 51, 51, 0.15);
            animation: glitch2 4s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
        }

        @keyframes glitch1 {

            0%,
            90%,
            100% {
                transform: none;
            }

            92% {
                transform: translate(-3px, 0);
            }

            94% {
                transform: translate(3px, 0);
            }
        }

        @keyframes glitch2 {

            0%,
            88%,
            100% {
                transform: none;
            }

            90% {
                transform: translate(3px, 0);
            }

            92% {
                transform: translate(-3px, 0);
            }
        }

        /* ---- Label ---- */
        .error-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(200, 165, 60, 0.7);
            margin-bottom: 1.5rem;
        }

        .error-label::before,
        .error-label::after {
            content: "";
            display: inline-block;
            width: 2rem;
            height: 1px;
            background: rgba(200, 165, 60, 0.4);
        }

        /* ---- Heading & body ---- */
        .error-title {
            font-family: var(--font-display, "Assassin", serif);
            font-size: clamp(1.4rem, 4vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 1rem;
        }

        .error-desc {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.7;
            margin-bottom: 0.5rem;
        }

        .error-context {
            font-size: 0.8rem;
            font-family: monospace;
            color: rgba(200, 165, 60, 0.5);
            margin-bottom: 2.5rem;
            min-height: 1.2em;
        }

        /* ---- Action buttons ---- */
        .error-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary-gold {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            background: rgba(200, 165, 60, 0.08);
            border: 1px solid rgba(200, 165, 60, 0.5);
            color: rgba(200, 165, 60, 0.9);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.78rem;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .btn-primary-gold:hover {
            background: rgba(200, 165, 60, 0.18);
            box-shadow: 0 0 16px rgba(200, 165, 60, 0.2);
            color: #fff;
        }

        .btn-secondary-muted {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.78rem;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .btn-secondary-muted:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }

        /* ---- Divider ---- */
        .error-divider {
            width: 3rem;
            height: 1px;
            background: rgba(200, 165, 60, 0.25);
            margin: 2rem auto 0;
        }
    </style>
</head>

<body>
    <div class="error-card">
        <i class="bi bi-exclamation-triangle animus-icon"></i>

        <div class="error-code">404</div>

        <p class="error-label">Animus Error</p>
        <h1 class="error-title">Memory Not Found</h1>

        <p class="error-desc">
            The Animus could not synchronize this genetic memory.<br>
            The sequence you requested does not exist in the database.
        </p>

        <!-- Populated by JS with the bad URL param, if available -->
        <p class="error-context" id="error-context"></p>

        <div class="error-actions">
            <a href="index.html" class="btn-primary-gold" id="btn-home">
                <i class="bi bi-house-door"></i> Return to Base
            </a>
            <a href="javascript:history.back()" class="btn-secondary-muted">
                <i class="bi bi-arrow-left"></i> Go Back
            </a>
        </div>

        <div class="error-divider"></div>
    </div>

    <script>
        // Show what went wrong based on the ?from= and ?ref= params passed by showError()
        (function () {
            const params = new URLSearchParams(window.location.search);
            const from = params.get("from");   // 'era' | 'game' | 'data'
            const ref = params.get("ref");    // the bad param value

            const ctx = document.getElementById("error-context");
            const btnHome = document.getElementById("btn-home");

            if (from === "era" && ref) {
                ctx.textContent = `Sequence "${ref}" is not a recognised era.`;
                btnHome.href = "index.html#featured-eras";
            } else if (from === "game" && ref) {
                ctx.textContent = `Game entry "${ref}" was not found in the Archives.`;
            } else if (from === "data") {
                ctx.textContent = "Could not reach the Animus database. Check your connection.";
            }
        })();
    </script>
</body>

</html>
